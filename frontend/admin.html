<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Data Nerd</title>
    <meta name="description" content="Administrative Control Panel for Data Nerd dataset platform. Manage catalog datasets and publish market analysis articles.">
    <meta name="keywords" content="admin panel, dataset management, articles publisher">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="headermenu">
        <div class="top-auth" id="top-auth">
            <!-- Dynamically populated by auth_helper.js -->
        </div>
        <h1>Data Nerd</h1>
        <p>Administrative Control Panel</p>
    </header>

    <!-- Main Admin Layout Wrapper -->
    <main id="admin-restricted-content" style="display: none;">
        
        <!-- 1. Setup Admin Account -->
        <div class="authbox">
            <p>1. Initialize Database Admin</p>
            <button id="setup-admin-btn">Setup Default Admin</button>
            <div id="setup-message"></div>
        </div>

        <!-- 2. Admin Login -->
        <div class="authbox" id="admin-login-box">
            <p>2. Authenticate Session</p>
            <form id="admin-login-form">
                <input type="text" id="admin-email" placeholder="Admin Email / User ID" required value="bh1rg1v">
                <input type="password" id="admin-password" placeholder="Admin Security Code" required value="BhargavRam@10">
                <button type="submit">Authenticate</button>
                <div id="admin-login-message"></div>
            </form>
        </div>

        <!-- 3. Add Dataset -->
        <div class="authbox" id="admin-dataset-box" style="opacity: 0.5; pointer-events: none;">
            <p>3. Register New Dataset</p>
            <form id="add-dataset-form">
                <input type="text" id="dataset-name" placeholder="Dataset Catalog Name" required>
                <input type="text" id="dataset-description" placeholder="Description (Comma-separated features)" required>
                <input type="number" id="dataset-price" placeholder="Pricing (₹)" required>
                <button type="submit">Add to Catalog</button>
                <div id="add-dataset-message"></div>
            </form>
        </div>

        <!-- 4. Add Article -->
        <div class="authbox" id="admin-article-box" style="opacity: 0.5; pointer-events: none; margin-bottom: 5rem;">
            <p>4. Publish New Article</p>
            <form id="add-article-form">
                <input type="text" id="article-title" placeholder="Article Title" required>
                <input type="text" id="article-slug" placeholder="Unique Slug/ID (e.g. options-strategies)" required>
                <textarea id="article-content" placeholder="Article Content (Supports Markdown/HTML)" required style="width: 100%; height: 200px; padding: 1rem; border: var(--border-width) solid var(--border-color); font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); resize: vertical; box-sizing: border-box;"></textarea>
                <button type="submit" style="margin-top: 1rem;">Publish Article</button>
                <div id="add-article-message"></div>
            </form>
        </div>
    </main>

    <!-- Access Denied Banner -->
    <div class="authbox" id="admin-denied-message" style="margin-top: 5rem;">
        <p style="color: var(--accent-red); font-size: 1.5rem; font-weight: 700;">Access Denied</p>
        <p>You must be logged in as an administrator to view this panel.</p>
        <a href="login.html" class="auth-btn signup-btn" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Proceed to Login</a>
    </div>

    <!-- Core Modular Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth_helper.js"></script>
    <!-- Page controller -->
    <script src="admin.js"></script>
</body>
</html>
