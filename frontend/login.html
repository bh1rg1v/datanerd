<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Data Nerd</title>
    <meta name="description" content="Log in to your Data Nerd account to access historical datasets of stocks, fundamentals, and options in the Indian equity markets.">
    <meta name="keywords" content="data nerd login, algo trading login, stock datasets access">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="headermenu">
        <div class="top-auth" id="top-auth">
            <!-- Automatically managed by auth_helper.js -->
        </div>
        <h1>Data Nerd</h1>
        <p>Login to access premium stock market datasets</p>
    </header>

    <!-- Login Auth Box -->
    <main class="authbox">
        <p>Access Your Account</p>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Email Address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Sign In</button>
            <div id="login-message"></div>
        </form>
        <p style="margin-top: 2rem; font-size: 0.95rem; color: var(--text-secondary);">
            Don't have an account? <a href="signup.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 600;">Sign up free</a>
        </p>
    </main>

    <!-- Core Modular Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth_helper.js"></script>
    <!-- Page controller -->
    <script src="login.js"></script>
</body>
</html>
