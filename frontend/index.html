<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Nerd - Stock & Options Datasets</title>
    <meta name="description" content="Explore and purchase premium historical datasets for stock fundamentals, options, and market ticks in the Indian equity markets on Data Nerd.">
    <meta name="keywords" content="indian stock market, stock datasets, option pricing, options historical data, equity fundamentals, algo trading datasets">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="headermenu">
        <div class="top-auth" id="top-auth">
            <!-- Dynamically populated by auth_helper.js -->
            <a href="login.html" class="auth-btn">Login</a>
            <a href="signup.html" class="auth-btn signup-btn">Sign Up</a>
        </div>
        <h1>Data Nerd</h1>
        <p>Historical Data of Stocks, Fundamentals, and Options in Indian Equity Markets</p>
    </header>

    <!-- Dynamic Datasets Catalog -->
    <main class="datasetinfo" id="datasets-container">
        <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
            <div class="loading-spinner"></div>
            <p style="color: var(--text-secondary); margin-top: 1rem;">Loading marketplace catalog...</p>
        </div>
    </main>

    <!-- Purchase Action Card -->
    <section class="checkoutbox">
        <p>Selected Data Total: <span>₹<span id="total-amount">0</span></span></p>
        <button id="checkout-btn" disabled>Message on Reddit to Buy</button>
        <div id="message"></div>
    </section>



    <!-- Core Modular Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth_helper.js"></script>
    <!-- Page controller -->
    <script src="script.js"></script>

</body>

</html>
